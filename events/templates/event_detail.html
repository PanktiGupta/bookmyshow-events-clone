{% extends 'base.html' %}
{% block content %}

<div class="max-w-5xl mx-auto p-6">

    <img src="{{ event.image }}" class="w-full h-80 object-cover rounded-xl mb-6">

    <h1 class="text-3xl font-bold mb-2">{{ event.title }}</h1>
    <p class="text-gray-500">{{ event.date }} | {{ event.location }}</p>

    <p class="mt-4 text-lg">{{ event.description }}</p>

    <p class="mt-4 text-2xl text-red-500 font-bold">₹{{ event.price }}</p>

    <!-- Wishlist -->
    <a href="/wishlist/{{ event.id }}/"
       class="mt-4 inline-block px-4 py-2 rounded
       {% if event.id in wishlist %}bg-red-500 text-white{% else %}bg-gray-200{% endif %}">
       ❤️ Wishlist
    </a>

</div>

{% endblock %}
