{% extends 'base.html' %}

{% block content %}

<div class="p-6">

<h1 class="text-3xl font-bold mb-6">All Events</h1>

<!-- FILTER -->
<div class="mb-6 space-x-3">
    <a href="/events/" class="bg-gray-200 px-3 py-1 rounded">All</a>
    <a href="/events/?category=Music" class="bg-gray-200 px-3 py-1 rounded">Music</a>
    <a href="/events/?category=Sports" class="bg-gray-200 px-3 py-1 rounded">Sports</a>
    <a href="/events/?category=Comedy" class="bg-gray-200 px-3 py-1 rounded">Comedy</a>
</div>

<!-- GRID -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-5">

{% for event in events %}
<div class="bg-white rounded shadow">

    <img src="{{ event.image }}" class="h-40 w-full object-cover rounded-t">

    <div class="p-3">
        <h3 class="font-bold">{{ event.title }}</h3>
        <p class="text-gray-500">{{ event.date }}</p>
        <p class="text-gray-500">{{ event.location }}</p>
        <p class="text-red-500">₹{{ event.price }}</p>
        <p class="text-sm text-gray-400">{{ event.category }}</p>
    </div>

</div>
{% endfor %}

</div>

</div>

{% endblock %}
