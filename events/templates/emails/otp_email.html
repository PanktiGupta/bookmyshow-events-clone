<!DOCTYPE html>
<html>
  <body style="margin:0; padding:0; background-color:#f4f4f4; font-family:Arial, sans-serif;">

    <div style="max-width:600px; margin:40px auto; background:#ffffff; border-radius:8px; overflow:hidden; border:1px solid #e6e6e6;">

      <div style="padding:20px; background-color:#111827; text-align:center;">
        <h2 style="color:#ffffff; margin:0;">BookMyShowPro</h2>
      </div>

      <div style="padding:30px; color:#333;">

        <h3>Verify your email address</h3>

        <p>Use the OTP below to complete verification.</p>

        <div style="text-align:center; margin:30px 0;">
          <div style="
              display:inline-block;
              padding:15px 25px;
              font-size:26px;
              letter-spacing:6px;
              font-weight:bold;
              background:#f3f4f6;
              border:1px dashed #9ca3af;
              border-radius:6px;
          ">
            {{ otp }}
          </div>
        </div>
        <div style="
            background:#fff3cd;
            padding:12px;
            border-radius:6px;
            margin-top:15px;">
            ⚠ Never share this OTP with anyone.
            </div>
        <p>This code will expire in <b>5 minutes</b>.</p>

        <p>If you did not request this, ignore this email.</p>

        <hr>

        <p style="font-size:12px; color:#888;">
          ©️ 2026 BookMyShowPro
        </p>

      </div>
    </div>

  </body>
</html>
