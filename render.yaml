services:
  - type: web
    name: bookmyshow-events-clone
    env: python
    buildCommand: ./build.sh
    startCommand: python3 manage.py migrate && python3 manage.py seed_events && gunicorn bookmyshow_clone.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.15
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: bookmyshow-events-clone.onrender.com,.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://bookmyshow-events-clone.onrender.com,https://*.onrender.com
